<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeLog</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1f3d;--blue:#2563eb;--blue-lt:#dbeafe;--teal:#0d9488;--teal-lt:#ccfbf1;
  --green:#16a34a;--green-lt:#dcfce7;--amber:#d97706;--amber-lt:#fef3c7;
  --red:#dc2626;--red-lt:#fee2e2;--gray:#6b7280;--gray-lt:#f3f4f6;
  --border:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;
  --bg:#fff;--bg2:#f9fafb;--shadow:0 1px 3px rgba(0,0,0,.08);
  --r:8px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--text);background:#f0f2f5;min-height:100vh;}
.app{max-width:1140px;margin:0 auto;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:36px;width:360px;box-shadow:var(--shadow);}
.auth-logo{font-size:22px;font-weight:600;color:var(--navy);margin-bottom:6px;}
.auth-logo span{font-family:var(--mono);font-size:13px;color:var(--blue);margin-left:6px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.auth-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--text3);border:none;font-family:var(--font);transition:all .15s;}
.auth-tab.active{background:var(--navy);color:#fff;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-group label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);}
.auth-input,.form-control{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg);transition:border-color .15s;}
.auth-input:focus,.form-control:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.auth-btn,.btn{padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .15s;font-weight:500;}
.auth-btn{width:100%;background:var(--navy);color:#fff;border-color:var(--navy);margin-top:4px;}
.auth-btn:hover{background:#1a2d4f;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#1d4ed8;}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-ghost:hover{background:var(--gray-lt);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{background:transparent;color:var(--red);border-color:#fca5a5;}
.btn-danger:hover{background:var(--red-lt);}
.auth-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px;}
.auth-msg{font-size:12px;color:var(--green);margin-top:6px;}

/* HEADER */
.header{background:var(--navy);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
.header-logo{color:#fff;font-size:15px;font-weight:600;}
.header-logo span{font-family:var(--mono);font-size:12px;color:#60a5fa;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:10px;}
.header-tabs{display:flex;gap:4px;}
.htab{background:transparent;border:none;color:#93c5fd;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s;}
.htab.active{background:var(--blue);color:#fff;}
.htab:hover:not(.active){background:rgba(255,255,255,.08);color:#fff;}
.header-user{font-size:12px;color:#93c5fd;}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:#93c5fd;padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font);cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.08);color:#fff;}

/* LAYOUT */
.main{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 50px);}
.sidebar{background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-scroll{flex:1;overflow-y:auto;}
.content{background:var(--bg2);overflow-y:auto;padding:20px;}

/* STRATEGY BAR */
.strategy-bar{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg2);}
.strategy-bar label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);display:block;margin-bottom:5px;}
.strategy-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);}

/* PROGRESS */
.progress-wrap{padding:10px 14px;border-bottom:1px solid var(--border);}
.progress-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.progress-label{font-size:12px;color:var(--text3);}
.progress-pct{font-family:var(--mono);font-size:12px;font-weight:500;}
.progress-bar{height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
.status-banner{margin:8px 14px;padding:8px 10px;border-radius:var(--r);font-size:12px;font-weight:500;}
.status-banner.go{background:var(--green-lt);color:var(--green);}
.status-banner.warn{background:var(--amber-lt);color:var(--amber);}
.status-banner.neutral{background:var(--gray-lt);color:var(--gray);}

/* PHASE */
.phase{border-bottom:1px solid var(--border);}
.phase-header{padding:9px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;background:var(--bg);transition:background .1s;}
.phase-header:hover{background:var(--gray-lt);}
.phase-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.phase-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);flex:1;}
.phase-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.phase-chevron{font-size:10px;color:var(--text3);transition:transform .2s;}
.phase.open .phase-chevron{transform:rotate(180deg);}
.checklist-body{display:none;padding:3px 0 6px;}
.phase.open .checklist-body{display:block;}
.check-item{padding:6px 14px 6px 10px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.check-item:hover{background:var(--gray-lt);}
.check-item.checked{background:#f0fdf4;border-left-color:var(--green);}
.check-box{width:17px;height:17px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-item.checked .check-box{background:var(--green);border-color:var(--green);}
.check-tick{color:#fff;font-size:10px;display:none;}
.check-item.checked .check-tick{display:block;}
.check-label{font-size:12px;color:var(--text2);line-height:1.4;flex:1;}
.check-label strong{font-weight:500;color:var(--text);}
.check-label .sub{font-size:11px;color:var(--text3);margin-top:1px;}
.check-stop{font-size:10px;background:var(--red-lt);color:var(--red);padding:1px 5px;border-radius:4px;margin-top:2px;display:inline-block;font-weight:500;}

/* SIDEBAR BOTTOM */
.sidebar-bottom{border-top:1px solid var(--border);padding:10px 14px;background:var(--bg);}

/* TRADE FORM */
.trade-form{background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:18px;box-shadow:var(--shadow);}
.form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.form-header-title{font-size:14px;font-weight:600;}
.form-header-actions{display:flex;gap:8px;align-items:center;}
.saving-indicator{font-size:11px;color:var(--text3);font-family:var(--mono);}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.form-group.wide{grid-column:1/-1;}
.form-group.half{grid-column:span 2;}
.form-control.textarea{resize:vertical;min-height:64px;}
.rr-display{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--mono);font-weight:500;background:var(--bg2);color:var(--text2);}
.rr-display.positive{color:var(--green);background:var(--green-lt);border-color:#86efac;}
.rr-display.negative{color:var(--red);background:var(--red-lt);border-color:#fca5a5;}

/* GRADE BUTTONS */
.grade-btns{display:flex;gap:5px;}
.grade-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text3);}
.grade-btn.sel{background:var(--green-lt);border-color:var(--green);color:var(--green);}

/* IMAGE/LINK UPLOAD */
.media-row{display:flex;gap:8px;align-items:flex-start;}
.img-preview{width:100%;max-height:180px;object-fit:contain;border-radius:var(--r);border:1px solid var(--border);margin-top:6px;display:none;}
.img-preview.visible{display:block;}

/* CUSTOM FIELDS */
.custom-fields-section{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.custom-fields-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.custom-fields-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.custom-field-row{display:grid;grid-template-columns:1fr 120px 32px;gap:6px;align-items:center;margin-bottom:6px;}
.custom-field-val{padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);color:var(--text);}
.custom-field-label{font-size:12px;color:var(--text2);font-weight:500;}
.field-manager{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:8px;}
.field-manager-title{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text2);}
.field-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.field-item input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);}
.field-item select{padding:5px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);}
.field-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 5px;border-radius:4px;}
.field-remove:hover{background:var(--red-lt);color:var(--red);}
.add-field-row{display:flex;gap:6px;margin-top:8px;}
.add-field-row input,.add-field-row select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);flex:1;}

/* JOURNAL */
.page{display:none;}
.page.active{display:block;}
.journal-section{background:var(--bg);border-radius:10px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.journal-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.journal-title{font-size:14px;font-weight:600;}
.journal-filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text2);background:var(--bg);}
.jtable{width:100%;border-collapse:collapse;font-size:12px;}
.jtable th{padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);background:var(--bg2);cursor:pointer;white-space:nowrap;}
.jtable td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
.jtable tr:last-child td{border-bottom:none;}
.jtable tr:hover td{background:var(--gray-lt);}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-W{background:var(--green-lt);color:var(--green);}
.badge-L{background:var(--red-lt);color:var(--red);}
.badge-BE{background:var(--amber-lt);color:var(--amber);}
.badge-Long{background:var(--blue-lt);color:var(--blue);}
.badge-Short{background:#fce7f3;color:#be185d;}
.r-pos{color:var(--green);font-family:var(--mono);font-weight:500;}
.r-neg{color:var(--red);font-family:var(--mono);font-weight:500;}
.r-neu{color:var(--amber);font-family:var(--mono);font-weight:500;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 5px;border-radius:4px;}
.del-btn:hover{background:var(--red-lt);color:var(--red);}
.thumb{width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);padding:11px 13px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.stat-value{font-size:20px;font-weight:600;font-family:var(--mono);}
.stat-value.green{color:var(--green);}
.stat-value.red{color:var(--red);}
.stat-value.blue{color:var(--blue);}
.empty{padding:36px 20px;text-align:center;color:var(--text3);font-size:13px;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;display:none;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg);border-radius:12px;padding:20px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--gray-lt);}
.modal img{width:100%;border-radius:var(--r);}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authWrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">TradeLog <span>v1.0</span></div>
    <div class="auth-sub">Logga in för att komma åt ditt journal</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Logga in</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Skapa konto</button>
    </div>
    <div class="form-group"><label>E-post</label><input type="email" class="auth-input" id="authEmail" placeholder="din@email.com"></div>
    <div class="form-group"><label>Lösenord</label><input type="password" class="auth-input" id="authPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <button class="auth-btn" onclick="doAuth()" id="authBtn">Logga in</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" style="display:none">
<div class="app">
<div class="header">
  <div class="header-logo">TradeLog <span>v1.0</span></div>
  <div class="header-right">
    <div class="header-tabs">
      <button class="htab active" onclick="showPage('checklist',this)">Checklista</button>
      <button class="htab" onclick="showPage('journal',this)">Journal</button>
    </div>
    <span class="header-user" id="headerUser"></span>
    <button class="logout-btn" onclick="doLogout()">Logga ut</button>
  </div>
</div>

<!-- CHECKLIST PAGE -->
<div id="page-checklist" class="page active">
<div class="main">
  <div class="sidebar">
    <div class="sidebar-scroll">
      <div class="strategy-bar">
        <label>Strategi</label>
        <select class="strategy-select" id="strategyPicker" onchange="loadStrategy()">
          <option value="unicorn">ICT Unicorn Model</option>
          <option value="globex">Bernd's Globex Strategy</option>
          <option value="venom">ICT Venom Model</option>
          <option value="turtle">ICT Turtle Soup</option>
          <option value="custom">— Egen strategi —</option>
        </select>
      </div>
      <div class="progress-wrap">
        <div class="progress-top">
          <span class="progress-label" id="progressLabel">0 / 0 steg klara</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div id="statusBanner" class="status-banner neutral" style="display:none"></div>
      <div id="checklistContainer"></div>
    </div>
    <div class="sidebar-bottom">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="resetChecklist()">↺ Nollställ</button>
        <span id="savingIndicator" class="saving-indicator"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT: TRADE FORM -->
  <div class="content">
    <div class="trade-form">
      <div class="form-header">
        <div class="form-header-title">📋 Trade-detaljer</div>
        <div class="form-header-actions">
          <button class="btn btn-ghost btn-sm" onclick="toggleFieldManager()">⚙ Anpassa fält</button>
          <button class="btn btn-primary btn-sm" onclick="logToJournal()">💾 Logga trade</button>
        </div>
      </div>

      <!-- STANDARD FIELDS -->
      <div class="form-grid" id="standardFields">
        <div class="form-group"><label>Datum</label><input type="date" class="form-control" id="f-date"></div>
        <div class="form-group"><label>Tid (ET)</label><input type="time" class="form-control" id="f-time"></div>
        <div class="form-group"><label>Instrument</label><input type="text" class="form-control" id="f-symbol" placeholder="NQ, ES, XAU…"></div>
        <div class="form-group"><label>Riktning</label>
          <select class="form-control" id="f-direction">
            <option value="">Välj…</option><option value="Long">Long</option><option value="Short">Short</option>
          </select>
        </div>
        <div class="form-group"><label>Entry</label><input type="number" step="0.01" class="form-control" id="f-entry" oninput="calcRR()" placeholder="0.00"></div>
        <div class="form-group"><label>Stop Loss</label><input type="number" step="0.01" class="form-control" id="f-sl" oninput="calcRR()" placeholder="0.00"></div>
        <div class="form-group"><label>Take Profit</label><input type="number" step="0.01" class="form-control" id="f-tp" oninput="calcRR()" placeholder="0.00"></div>
        <div class="form-group"><label>Utfall</label>
          <select class="form-control" id="f-outcome" onchange="calcRR()">
            <option value="">Välj…</option><option value="W">Win</option><option value="L">Loss</option><option value="BE">Break Even</option>
          </select>
        </div>
        <div class="form-group"><label>Resultat (R) <span style="color:var(--text3);font-weight:400">auto</span></label>
          <div class="rr-display" id="rrDisplay">—</div>
        </div>
        <div class="form-group"><label>Setup-kvalitet</label>
          <div class="grade-btns">
            <button class="grade-btn" data-grade="A+" onclick="setGrade('A+')">A+</button>
            <button class="grade-btn" data-grade="A" onclick="setGrade('A')">A</button>
            <button class="grade-btn" data-grade="B" onclick="setGrade('B')">B</button>
            <button class="grade-btn" data-grade="C" onclick="setGrade('C')">C</button>
          </div>
        </div>
        <div class="form-group half"><label>Chart-länk (TradingView etc.)</label>
          <input type="url" class="form-control" id="f-chartlink" placeholder="https://www.tradingview.com/…">
        </div>
        <div class="form-group half"><label>Skärmbild (bild-URL eller ladda upp)</label>
          <div class="media-row">
            <input type="url" class="form-control" id="f-imgurl" placeholder="https://…" oninput="previewImg()" style="flex:1">
            <label class="btn btn-ghost btn-sm" style="cursor:pointer;white-space:nowrap">
              📎 Ladda upp<input type="file" accept="image/*" id="f-imgfile" style="display:none" onchange="handleImgUpload(this)">
            </label>
          </div>
          <img id="imgPreview" class="img-preview" src="" alt="förhandsgranskning" onclick="openImgModal(this.src)">
        </div>
        <div class="form-group wide"><label>Noteringar</label>
          <textarea class="form-control textarea" id="f-notes" placeholder="Vad gick bra? Vad kunde gjorts bättre? Avvikelser från reglerna?"></textarea>
        </div>
      </div>

      <!-- CUSTOM FIELDS -->
      <div class="custom-fields-section" id="customFieldsSection" style="display:none">
        <div class="custom-fields-header">
          <span class="custom-fields-title">Egna fält</span>
        </div>
        <div id="customFieldInputs"></div>
      </div>

      <!-- FIELD MANAGER -->
      <div class="field-manager" id="fieldManager" style="display:none">
        <div class="field-manager-title">⚙ Hantera egna fält</div>
        <div id="fieldList"></div>
        <div class="add-field-row">
          <input type="text" id="newFieldName" placeholder="Fältnamn (t.ex. Dag i vecka)">
          <select id="newFieldType">
            <option value="text">Text</option>
            <option value="number">Nummer</option>
            <option value="select">Dropdown</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="addCustomField()">+ Lägg till</button>
        </div>
      </div>
    </div>
  </div>

// ── RR CALC ───────────────────────────────────────────────────────────────────
function calcRR(){
  const entry=parseFloat(document.getElementById('f-entry').value);
  const sl=parseFloat(document.getElementById('f-sl').value);
  const tp=parseFloat(document.getElementById('f-tp').value);
  const outcome=document.getElementById('f-outcome').value;
  const disp=document.getElementById('rrDisplay');
  if(!entry||!sl||isNaN(entry)||isNaN(sl)){disp.textContent='—';disp.className='rr-display';calculatedR=null;return;}
  const risk=Math.abs(entry-sl);
  if(risk===0){disp.textContent='—';disp.className='rr-display';calculatedR=null;return;}
  if(outcome==='BE'){disp.textContent='0.00R';disp.className='rr-display r-neu';calculatedR=0;return;}
  if(outcome==='W'&&tp&&!isNaN(tp)){
    const reward=Math.abs(tp-entry);
    const r=(reward/risk).toFixed(2);
    disp.textContent='+'+r+'R';disp.className='rr-display positive';calculatedR=parseFloat(r);
  }else if(outcome==='L'){
    disp.textContent='-1.00R';disp.className='rr-display negative';calculatedR=-1;
  }else if(tp&&!isNaN(tp)){
    const reward=Math.abs(tp-entry);
    const r=(reward/risk).toFixed(2);
    disp.textContent=r+'R (planerat)';disp.className='rr-display';calculatedR=null;
  }else{
    disp.textContent='—';disp.className='rr-display';calculatedR=null;
  }
}

            <div class="check-box"><span class="check-tick">✓</span></div>
            <div class="check-label">
              <strong>${item.label}</strong>
              ${item.sub?`<div class="sub">${item.sub}</div>`:''}

      </div>`;
    container.appendChild(div);
  });
  updateProgress();
}

function togglePhase(id){document.getElementById('phase-'+id).classList.toggle('open');}

function toggleCheck(id,phaseId){
  checked[id]=!checked[id];
  const el=document.getElementById('ci-'+id);
  el.classList.toggle('checked',checked[id]);
  const strat=STRATEGIES[activeStrategy];
  const item=strat.phases.flatMap(p=>p.items).find(i=>i.id===id);
  if(item&&item.stop){
    const stopEl=el.querySelector('.check-stop');
    if(checked[id]&&stopEl)stopEl.remove();
    else if(!checked[id]&&!stopEl){const s=document.createElement('div');s.className='check-stop';s.textContent='⛔ '+item.stop;el.querySelector('.check-label').appendChild(s);}
  }
  const phase=strat.phases.find(p=>p.id===phaseId);
  if(phase){const done=phase.items.filter(it=>checked[it.id]).length;document.getElementById('pc-'+phaseId).textContent=`${done}/${phase.items.length}`;}
  updateProgress();
}

function updateProgress(){
  const strat=STRATEGIES[activeStrategy];
  const allItems=strat.phases.flatMap(p=>p.items);
  const total=allItems.length;
  const done=allItems.filter(it=>checked[it.id]).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressLabel').textContent=`${done} / ${total} steg klara`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  const banner=document.getElementById('statusBanner');
  const blockers=allItems.filter(it=>it.blocker&&!checked[it.id]);
  if(pct===100){banner.style.display='block';banner.className='status-banner go';banner.textContent='✅ Alla steg klara – A+ setup!';}
  else if(blockers.length>0&&done>0){banner.style.display='block';banner.className='status-banner warn';banner.textContent=`⚠ Blockerande: "${blockers[0].label}"`;}
  else{banner.style.display='none';}
}

    sl:parseFloat(document.getElementById('f-sl').value)||null,
    tp:parseFloat(document.getElementById('f-tp').value)||null,
    outcome:document.getElementById('f-outcome').value||null,
    result:calculatedR,
    grade:selectedGrade||null,
    checklist_pct:pct,
    notes:document.getElementById('f-notes').value||null,
    chart_link:document.getElementById('f-chartlink').value||null,
    image_url:document.getElementById('f-imgurl').value||null,
    custom_data:Object.keys(customData).length?customData:null,
  };
  await saveTrade(trade);
  resetChecklist();
  showPage('journal',document.querySelectorAll('.htab')[1]);
}

// ── JOURNAL ───────────────────────────────────────────────────────────────────
function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='journal'){updateStats();renderJournal();}
}

function updateStats(){
  const fs=document.getElementById('filterStrategy').value;
  const fo=document.getElementById('filterOutcome').value;
  const trades=journal.filter(t=>(!fs||t.strategy===fs)&&(!fo||t.outcome===fo));
  const withR=trades.filter(t=>t.result!=null);
  const wins=withR.filter(t=>t.outcome==='W').length;
  const wr=withR.length?(wins/withR.length*100).toFixed(0)+'%':'—';
  const totalR=withR.reduce((a,t)=>a+(t.result||0),0);
  const avgR=withR.length?(totalR/withR.length).toFixed(2):'—';
  const winR=withR.filter(t=>t.result>0).reduce((a,t)=>a+t.result,0);
  const lossR=Math.abs(withR.filter(t=>t.result<0).reduce((a,t)=>a+t.result,0));
  const pf=lossR>0?(winR/lossR).toFixed(2):'—';
  document.getElementById('s-total').textContent=trades.length;
  const wrEl=document.getElementById('s-wr');wrEl.textContent=wr;wrEl.className='stat-value'+(wins>withR.length-wins?' green':wins<withR.length-wins?' red':'');
  const arEl=document.getElementById('s-avgr');arEl.textContent=avgR==='—'?'—':(parseFloat(avgR)>0?'+':'')+avgR+'R';arEl.className='stat-value'+(parseFloat(avgR)>0?' green':parseFloat(avgR)<0?' red':'');
  const trEl=document.getElementById('s-totalr');trEl.textContent=withR.length===0?'—':(totalR>=0?'+':'')+totalR.toFixed(2)+'R';trEl.className='stat-value'+(totalR>0?' green':totalR<0?' red':'');
  document.getElementById('s-pf').textContent=pf;
}

function renderJournal(){
  updateStats();
  const fs=document.getElementById('filterStrategy').value;
  const fo=document.getElementById('filterOutcome').value;
  let trades=journal.filter(t=>(!fs||t.strategy===fs)&&(!fo||t.outcome===fo));
  trades.sort((a,b)=>{let av=a[sortCol]||'',bv=b[sortCol]||'';return typeof av==='string'?av.localeCompare(bv)*sortDir:(av-bv)*sortDir;});
  const body=document.getElementById('journalBody');
  if(!trades.length){body.innerHTML='<div class="empty">Inga trades loggade ännu.</div>';return;}
  const th=['Datum','Strategi','Sym','Dir','Entry','SL','TP','Utfall','R','Grade','%','📷','🔗',''].map((h,i)=>{
    const cols=['date','strategy','symbol','direction','entry','sl','tp','outcome','result','grade','checklist_pct','image_url','chart_link',''];
    return h?`<th onclick="sortBy('${cols[i]}')" title="${cols[i]}">${h}${sortCol===cols[i]?(sortDir>0?' ▴':' ▾'):''}</th>`:'<th></th>';
  }).join('');
  const rows=trades.map(t=>`<tr>
    <td style="white-space:nowrap;font-family:var(--mono);font-size:11px">${t.date||'—'}${t.time?`<br><span style="color:var(--text3)">${t.time}</span>`:''}</td>
    <td style="font-size:11px;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.strategy||'—'}</td>
    <td><strong>${t.symbol||'—'}</strong></td>
    <td>${t.direction?`<span class="badge badge-${t.direction}">${t.direction}</span>`:'—'}</td>
    <td style="font-family:var(--mono);font-size:11px">${t.entry??'—'}</td>
    <td style="font-family:var(--mono);font-size:11px">${t.sl??'—'}</td>
    <td style="font-family:var(--mono);font-size:11px">${t.tp??'—'}</td>
    <td>${t.outcome?`<span class="badge badge-${t.outcome}">${t.outcome}</span>`:'—'}</td>
    <td class="${t.result>0?'r-pos':t.result<0?'r-neg':'r-neu'}">${t.result!=null?((t.result>0?'+':'')+Number(t.result).toFixed(2)+'R'):'—'}</td>
    <td style="font-weight:700;color:${t.grade==='A+'?'var(--green)':t.grade==='A'?'var(--teal)':t.grade==='B'?'var(--amber)':t.grade==='C'?'var(--red)':'var(--text3)'}">${t.grade||'—'}</td>
    <td style="font-family:var(--mono);font-size:11px">${t.checklist_pct!=null?t.checklist_pct+'%':'—'}</td>
    <td>${t.image_url?`<img src="${t.image_url}" class="thumb" onclick="openImgModal('${t.image_url}')" alt="chart">`:'—'}</td>
    <td>${t.chart_link?`<a href="${t.chart_link}" target="_blank" style="color:var(--blue);font-size:11px">↗ TV</a>`:'—'}</td>
    <td><button class="del-btn" onclick="deleteTrade('${t.id}')">✕</button></td>
  </tr>`).join('');
  body.innerHTML=`<table class="jtable"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
}

function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}renderJournal();}

function exportCSV(){
  const cols=["date","time","strategy","symbol","direction","entry","sl","tp","outcome","result","grade","checklist_pct","chart_link","notes"];
  const csv=[cols.join(","),...journal.map(t=>cols.map(c=>{const v=t[c]??'';return typeof v==='string'&&v.includes(',')? `"${v}"`:v;}).join(","))].join("\n");
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tradelog.csv';a.click();
}
</script>
</body>
