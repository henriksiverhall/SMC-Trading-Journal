name: Nightly Database Backup

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC varje natt
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: sudo apt-get install -y postgresql-common && sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y && sudo apt-get install -y postgresql-client-17
      
      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILE="tradelog_backup_${TIMESTAMP}.sql.gz"
          echo "BACKUP_FILE=${FILE}" >> $GITHUB_ENV

          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges --exclude-table-data=public.market_bars | gzip > "$FILE"

          SIZE=$(stat -c%s "$FILE")
          echo "Backup-storlek: ${SIZE} bytes"
          if [ "$SIZE" -lt 2000 ]; then
            echo "::error::Backupfilen är misstänkt liten (${SIZE} bytes) – pg_dump gav troligen inget resultat. Avbryter utan att ladda upp."
            exit 1
          fi

      - name: Install AWS CLI (R2 är S3-kompatibelt)
        run: pip install awscli

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          aws s3 cp "$BACKUP_FILE" "s3://${R2_BUCKET_NAME}/${BACKUP_FILE}" \
            --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region auto

      - name: Delete backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)
          aws s3api list-objects-v2 --bucket "$R2_BUCKET_NAME" --endpoint-url "$ENDPOINT" \
            --query "Contents[?LastModified<='${CUTOFF}'].Key" --output text | tr '\t' '\n' | while read -r key; do
              if [ -n "$key" ]; then
                echo "Raderar gammal backup: $key"
                aws s3 rm "s3://${R2_BUCKET_NAME}/${key}" --endpoint-url "$ENDPOINT"
              fi
            done
